<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .bg { fill: #0F172A }
      @media (prefers-color-scheme: light) { .bg { fill: #ffffff } }
    </style>
    <linearGradient id="g" x1="10" y1="10" x2="90" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background: dark (icon 1) in dark mode, white (icon 2) in light mode -->
  <rect width="100" height="100" rx="22" class="bg"/>
  <!-- Movr M shape with play-button left leg -->
  <path d="M 10,10 L 10,70 L 50,53 L 90,70 L 90,10 L 77,10 L 50,43 L 36,35 L 23,10 Z"
        fill="url(#g)"/>
  <!-- Red dot (brand "ponto final") -->
  <circle cx="83" cy="83" r="8" fill="#EF4444"/>
</svg>